name: Build and Test

on:
  push:
    branches:
      - main
      - develop
      - feature/**

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: |
          dotnet restore Smart-CI-Failure-Analyzer-Test.sln \
            2>&1 | tee restore.log

      - name: Build Solution
        id: build
        run: |
          dotnet build Smart-CI-Failure-Analyzer-Test.sln \
            --configuration Release \
            --no-restore \
            2>&1 | tee build.log

      - name: Run Unit Tests
        id: tests
        run: |
          dotnet test Smart-CI-Failure-Analyzer-Test.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            2>&1 | tee test.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            restore.log
            build.log
            test.log

      - name: Analyze Pipeline Failure
        if: failure()
        run: |
          echo "Pipeline failed. Sending logs to Smart CI Analyzer..."

          LOG_CONTENT=$(cat restore.log build.log test.log 2>/dev/null | tail -100)

          JSON_LOGS=$(printf '%s\n' "$LOG_CONTENT" | jq -R . | jq -s .)

          cat > request.json <<EOF
          {
            "pipelineId": "${{ github.run_id }}",
            "failedSteps": [
              {
                "stepName": "Build/Test",
                "logs": $JSON_LOGS
              }
            ]
          }
          EOF

          echo "===== REQUEST ====="
          cat request.json

          RESPONSE=$(curl -s \
            -X POST \
            https://smart-ci-analyzer.onrender.com/api/v1/analyze \
            -H "Content-Type: application/json" \
            -d @request.json)

          echo ""
          echo "=========================================="
          echo "        SMART CI ANALYZER RESULT"
          echo "=========================================="

          echo "$RESPONSE" | jq .

          echo ""
          echo "=========================================="

      - name: Pipeline Summary
        if: failure()
        run: |
          echo "Build or test execution failed."
          echo "Smart CI Analyzer has been invoked."